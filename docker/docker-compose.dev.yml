name: efk-va-estriche

services:
  nginx:
    image: nginx:alpine
    container_name: efk-va-estriche-nginx
    ports:
      - "8094:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ..:/var/www/html:ro
    depends_on:
      - app
    networks:
      - efk-va-estriche-net
    restart: unless-stopped

  app:
    build:
      context: ..
      dockerfile: Dockerfile.dev
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: efk-va-estriche-app
    volumes:
      - ..:/var/www/html
    environment:
      APP_NAME: "eFakture VA Estriche"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8094
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: efakture_va_estriche
      DB_USERNAME: efakture
      DB_PASSWORD: efakture
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
    depends_on:
      db:
        condition: service_healthy
    networks:
      - efk-va-estriche-net
    restart: unless-stopped

  db:
    image: mariadb:11.4.3
    container_name: efk-va-estriche-db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: efakture_va_estriche
      MYSQL_USER: efakture
      MYSQL_PASSWORD: efakture
    ports:
      - "3312:3306"
    volumes:
      - efk-va-estriche-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-uroot", "-proot_password", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - efk-va-estriche-net
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: efk-va-estriche-phpmyadmin
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root_password
      UPLOAD_LIMIT: 256M
    ports:
      - "8095:80"
    depends_on:
      - db
    networks:
      - efk-va-estriche-net
    restart: unless-stopped

volumes:
  efk-va-estriche-db-data:

networks:
  efk-va-estriche-net:
    driver: bridge
